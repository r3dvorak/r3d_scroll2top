PLG_SYSTEM_R3D_SCROLL2TOP=Scroll To Top Button (R3D)
PLG_SYSTEM_R3D_SCROLL2TOP_DESC=Adds a minimalist scroll-to-top button (PHP 8.4+ and Joomla 5 compatible).
PLG_SYSTEM_R3D_SCROLL2TOP_XML_DESCRIPTION=This plugin displays a configurable scroll-to-top button. You can use a PNG, SVG, or Unicode character as the icon. See the Help tab for more information.

PLG_SYSTEM_R3D_SCROLL2TOP_TAB_BASIC=Settings
PLG_SYSTEM_R3D_SCROLL2TOP_TAB_HELP=Help

PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_LABEL=Button color
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_DESC=Background color of the scroll-to-top button.
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_LABEL=Button position
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_DESC=Where should the button appear?
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_BOTTOMRIGHT=Bottom right
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_BOTTOMLEFT=Bottom left
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_TOPRIGHT=Top right
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_TOPLEFT=Top left
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_IMAGE_LABEL=Upload PNG/GIF/WebP icon
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_IMAGE_DESC=Upload a PNG, GIF or WebP icon (recommended: transparent, max. 128x128 px).
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_LABEL=Icon (Unicode or SVG)
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_DESC=Insert a Unicode character (e.g. ↑), SVG code (&lt;svg&gt;...&lt;/svg&gt;), or emoji. If both image and this field are filled: image takes priority.
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_ROTATE_LABEL=Icon rotation (degrees)
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_ROTATE_DESC=Rotate the icon by X degrees (e.g. -90 for '>' upwards, 0 for none, 180 for upside down).
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_TRANSLATEY_LABEL=Icon vertical offset (%)
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_TRANSLATEY_DESC=Fine-tune icon position (in percent). -20 is usually perfect for centering.
PLG_SYSTEM_R3D_SCROLL2TOP_SIZE_LABEL=Button size (px)
PLG_SYSTEM_R3D_SCROLL2TOP_SIZE_DESC=Width/height of the button in pixels.
PLG_SYSTEM_R3D_SCROLL2TOP_TRIGGER_LABEL=Scroll trigger (px or 'window')
PLG_SYSTEM_R3D_SCROLL2TOP_TRIGGER_DESC=Show button after X pixels (e.g. 300), or 'window' for one viewport height.
PLG_SYSTEM_R3D_SCROLL2TOP_FADE_LABEL=Fade animation
PLG_SYSTEM_R3D_SCROLL2TOP_FADE_DESC=Fade button in/out with animation.

PLG_SYSTEM_R3D_SCROLL2TOP_HELP_TITLE=Help & Instructions
PLG_SYSTEM_R3D_SCROLL2TOP_HELP_DESC=Instructions for using this plugin.
PLG_SYSTEM_R3D_SCROLL2TOP_HELP_HTML=<h4>Icon tips:</h4><ul><li><b>Unicode</b>: Simply paste a character (e.g. ↑, ⬆, ^ or an emoji).</li><li><b>SVG</b>: Paste SVG source code directly (e.g. from a graphics tool).</li><li><b>Image</b>: Upload a PNG, GIF or WebP (transparent icons recommended, min 40 x 40 px). Image takes priority.</li><li><b>JPG is not supported</b> (no transparency).</li></ul><h4>More</h4>Questions and support: <a href='https://r3d.de' target='_blank'>r3d.de</a>.

PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_LABEL=Hover color (RGBA/HEX)
PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_DESC=Enter a CSS color value: e.g. #444444, rgba(68,68,68,0.9) or transparent. Supports HEX, RGB, RGBA, and color names.
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_LABEL=Button color
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_DESC=Main button color (HEX).
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_ALPHA_LABEL=Button transparency
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_ALPHA_DESC=Transparency value (0–1, e.g. 0.85).

PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_LABEL=Button hover color
PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_DESC=Color on mouseover/focus (HEX).
PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_ALPHA_LABEL=Button hover transparency
PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_ALPHA_DESC=Transparency for hover color (0–1).

PLG_SYSTEM_R3D_SCROLL2TOP_ICON_COLOR_LABEL=Icon color (SVG/Unicode)
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_COLOR_DESC=CSS color for the icon (SVG/Unicode, not for PNG). Best use HEX.
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_COLOR_ALPHA_LABEL=Icon transparency
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_COLOR_ALPHA_DESC=Transparency value for the icon (0–1).
