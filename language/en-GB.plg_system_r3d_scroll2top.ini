PLG_SYSTEM_R3D_SCROLL2TOP="Scroll To Top Button (R3D)"
PLG_SYSTEM_R3D_SCROLL2TOP_DESC="Adds a minimal floating scroll-to-top button (PHP 8.4+ and Joomla 5 compatible)."

PLG_SYSTEM_R3D_SCROLL2TOP_XML_DESCRIPTION="This plugin displays a configurable scroll-to-top button. You can customize color, position, size, icon or SVG, fade animation, and at which scroll position the button appears. <br />For documentation and support, visit <a href='https://r3d.de' target='_blank'>r3d.de</a>."

PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_LABEL="Button color"
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_DESC="Set the background color of the scroll-to-top button."
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_LABEL="Button position"
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_DESC="Select where the button should appear."
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_BOTTOMRIGHT="Bottom right"
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_BOTTOMLEFT="Bottom left"
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_TOPRIGHT="Top right"
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_TOPLEFT="Top left"
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_LABEL="Icon type"
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_DESC="Use 'arrow' for the default arrow or leave blank to use a custom SVG below."
PLG_SYSTEM_R3D_SCROLL2TOP_SVG_LABEL="Custom SVG icon"
PLG_SYSTEM_R3D_SCROLL2TOP_SVG_DESC="Paste your own SVG code here to replace the default icon."
PLG_SYSTEM_R3D_SCROLL2TOP_SIZE_LABEL="Button size (px)"
PLG_SYSTEM_R3D_SCROLL2TOP_SIZE_DESC="Width/height of the button in pixels."
PLG_SYSTEM_R3D_SCROLL2TOP_TRIGGER_LABEL="Scroll trigger (px or 'window')"
PLG_SYSTEM_R3D_SCROLL2TOP_TRIGGER_DESC="Show the button after scrolling X pixels (e.g. 300), or type 'window' for one window height."
PLG_SYSTEM_R3D_SCROLL2TOP_FADE_LABEL="Fade animation"
PLG_SYSTEM_R3D_SCROLL2TOP_FADE_DESC="Fade in/out the button when showing/hiding."

PLG_SYSTEM_R3D_SCROLL2TOP_ICON_ROTATE_LABEL="Icon rotation (degrees)"
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_ROTATE_DESC="Set rotation for the icon in degrees (e.g. -90 for '>' upwards, 0 for no rotation, 180 for upside-down)."
