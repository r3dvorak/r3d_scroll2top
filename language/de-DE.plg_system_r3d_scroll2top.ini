PLG_SYSTEM_R3D_SCROLL2TOP="Scroll To Top Button (R3D)"
PLG_SYSTEM_R3D_SCROLL2TOP_DESC="Fügt einen minimalistischen Scroll-to-Top-Button ein (PHP 8.4+ und Joomla 5 kompatibel)."

PLG_SYSTEM_R3D_SCROLL2TOP_XML_DESCRIPTION="Dieses Plugin blendet einen konfigurierbaren Scroll-to-Top-Button ein. Du kannst Farbe, Position, Größe, Icon oder SVG, Fade-Animation und die Auslöserposition selbst festlegen. <br />Weitere Infos und Support auf <a href='https://r3d.de' target='_blank'>r3d.de</a>."

PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_LABEL="Button-Farbe"
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_DESC="Hintergrundfarbe des Scroll-to-Top-Buttons."
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_LABEL="Button-Position"
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_DESC="Wo soll der Button erscheinen?"
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_BOTTOMRIGHT="Unten rechts"
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_BOTTOMLEFT="Unten links"
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_TOPRIGHT="Oben rechts"
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_TOPLEFT="Oben links"
