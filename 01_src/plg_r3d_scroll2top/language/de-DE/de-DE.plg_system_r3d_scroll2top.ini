PLG_SYSTEM_R3D_SCROLL2TOP=Scroll To Top Button (R3D)
PLG_SYSTEM_R3D_SCROLL2TOP_DESC=Fügt einen minimalistischen Scroll-to-Top-Button ein (kompatibel mit Joomla 4.4, 5 und 6).
PLG_SYSTEM_R3D_SCROLL2TOP_XML_DESCRIPTION=Dieses Plugin blendet einen konfigurierbaren Scroll-to-Top-Button ein. Als Icon kannst du ein PNG, SVG oder Unicode-Zeichen verwenden. Siehe den Hilfe-Tab für mehr Infos.

PLG_SYSTEM_R3D_SCROLL2TOP_TAB_BASIC=Einstellungen
PLG_SYSTEM_R3D_SCROLL2TOP_TAB_HELP=Hilfe

PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_LABEL=Button-Farbe
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_DESC=Hintergrundfarbe des Scroll-to-Top-Buttons.
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_LABEL=Button-Position
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_DESC=Wo soll der Button erscheinen?
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_BOTTOMRIGHT=Unten rechts
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_BOTTOMLEFT=Unten links
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_TOPRIGHT=Oben rechts
PLG_SYSTEM_R3D_SCROLL2TOP_POSITION_TOPLEFT=Oben links
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_IMAGE_LABEL=PNG/GIF/WebP-Icon hochladen
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_IMAGE_DESC=Lade ein PNG-, GIF- oder WebP-Icon hoch (empfohlen: transparent, max. 128x128 px).
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_LABEL=Icon (Unicode oder SVG)
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_DESC=Unicode-Zeichen (z. B. ↑), SVG-Code (&lt;svg&gt;...&lt;/svg&gt;) oder Emoji einfügen. Wenn Bild und Feld gefüllt: Bild hat Priorität.
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_ROTATE_LABEL=Icon-Rotation (Grad)
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_ROTATE_DESC=Icon um X Grad drehen (z. B. -90 für '>' nach oben, 0 für keine Drehung, 180 für auf den Kopf).
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_TRANSLATEY_LABEL=Icon-Verschiebung vertikal (%)
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_TRANSLATEY_DESC=Feinabstimmung der Icon-Position (in Prozent). -20 ist meist ideal für perfekte Zentrierung.
PLG_SYSTEM_R3D_SCROLL2TOP_SIZE_LABEL=Button-Größe (px)
PLG_SYSTEM_R3D_SCROLL2TOP_SIZE_DESC=Breite/Höhe des Buttons in Pixel.
PLG_SYSTEM_R3D_SCROLL2TOP_TRIGGER_LABEL=Scroll-Trigger (px oder 'window')
PLG_SYSTEM_R3D_SCROLL2TOP_TRIGGER_DESC=Button nach X Pixel anzeigen (z. B. 300), oder 'window' für eine Fensterhöhe.
PLG_SYSTEM_R3D_SCROLL2TOP_FADE_LABEL=Fade-Animation
PLG_SYSTEM_R3D_SCROLL2TOP_FADE_DESC=Button mit Überblendung ein-/ausblenden.

PLG_SYSTEM_R3D_SCROLL2TOP_HELP_TITLE=Hilfe & Anleitung
PLG_SYSTEM_R3D_SCROLL2TOP_HELP_DESC=Hinweise zur Verwendung dieses Plugins.
PLG_SYSTEM_R3D_SCROLL2TOP_HELP_HTML=<h4>Icon-Tipps:</h4><ul><li><b>Unicode</b>: Einfach ein Zeichen einfügen (z. B. ↑, ⬆, ^ oder ein Emoji).</li><li><b>SVG</b>: SVG-Quelltext direkt einfügen (z.B. aus einem Grafikprogramm).</li><li><b>Bild</b>: Lade ein PNG, GIF oder WebP hoch (transparente Icons empfohlen, min 40 x 40 Pixel). Bild hat Priorität.</li><li><b>JPG wird nicht unterstützt</b> (keine Transparenz).</li></ul><h4>Mehr</h4>Fragen und Support auf <a href='https://r3d.de' target='_blank'>r3d.de</a>.

PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_LABEL=Farbe bei Mouseover (RGBA/HEX)
PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_DESC=Gib einen CSS-Farbwert ein: z.&nbsp;B. #444444, rgba(68,68,68,0.9) oder transparent. Unterstützt HEX, RGB, RGBA, und Farbnamen.
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_LABEL=Button-Farbe
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_DESC=Hauptfarbe des Scroll-Buttons (HEX).
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_ALPHA_LABEL=Button-Transparenz
PLG_SYSTEM_R3D_SCROLL2TOP_COLOR_ALPHA_DESC=Wert für die Transparenz (0–1, z.B. 0.85).

PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_LABEL=Button-Hoverfarbe
PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_DESC=Farbe bei Mouseover/focus (HEX).
PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_ALPHA_LABEL=Button-Hover-Transparenz
PLG_SYSTEM_R3D_SCROLL2TOP_HOVER_COLOR_ALPHA_DESC=Transparenz für Hoverfarbe (0–1).

PLG_SYSTEM_R3D_SCROLL2TOP_ICON_COLOR_LABEL=Icon-Farbe (SVG/Unicode)
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_COLOR_DESC=CSS-Farbe für das Icon (SVG/Unicode, nicht für PNG). Am besten HEX.
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_COLOR_ALPHA_LABEL=Icon-Transparenz
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_COLOR_ALPHA_DESC=Transparenzwert für das Icon (0–1).
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_HOVER_COLOR_LABEL=Icon-Hoverfarbe (SVG/Unicode)
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_HOVER_COLOR_DESC=CSS-Farbe für das Icon bei Hover/Fokus (SVG/Unicode, nicht für PNG).
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_HOVER_COLOR_ALPHA_LABEL=Icon-Hover-Transparenz
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_HOVER_COLOR_ALPHA_DESC=Transparenzwert für die Hover-Iconfarbe (0–1).

PLG_SYSTEM_R3D_SCROLL2TOP_ICON_JITTER_LABEL=Icon-Animation (Zittern)
PLG_SYSTEM_R3D_SCROLL2TOP_ICON_JITTER_DESC=Ob das Icon beim Mouseover kurz „zittert“ (Schüttel-Animation). Standard: Ja.

PLG_SYSTEM_R3D_SCROLL2TOP_BUTTON_SHADOW_LABEL=Button-Schatten anzeigen
PLG_SYSTEM_R3D_SCROLL2TOP_BUTTON_SHADOW_DESC=Zeigt einen leichten Schatten um den Button an (empfohlen für Sichtbarkeit).
